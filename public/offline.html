<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sem conexão · ZapInbox</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0; min-height: 100dvh; display: grid; place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #038c7b; color: #fff; text-align: center; padding: 24px;
      }
      .card { max-width: 320px; }
      .dot { display: inline-flex; gap: 8px; margin-bottom: 20px; }
      .dot span { width: 12px; height: 12px; border-radius: 50%; background: #fff; opacity: .9; }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { margin: 0; opacity: .9; line-height: 1.5; }
      button {
        margin-top: 20px; border: 0; border-radius: 10px; padding: 12px 20px;
        background: #fff; color: #059669; font-weight: 600; font-size: 15px; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="dot"><span></span><span></span><span></span></div>
      <h1>Sem conexão</h1>
      <p>Você está offline. Assim que a internet voltar, é só recarregar para continuar o atendimento.</p>
      <button onclick="location.reload()">Tentar de novo</button>
    </div>
  </body>
</html>
